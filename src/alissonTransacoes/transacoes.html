<link rel="stylesheet" href="alissonTransacoes/style.css">

<div class="transacoes-container animate__animated animate__fadeIn">
    <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold mb-0">Todas as Transações</h2>
            <button type="button" class="btn btn-success fw-bold" id="botaoAbrirTransacao">
                <i class="fa-solid fa-plus me-2"></i>Realizar Transação
            </button>
        </div>

        <div class="table-responsive">
            <div id="listaTransacoes" class="mt-2">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalDialog" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-dark text-white py-3 px-4 rounded-top-4">
                <h5 class="modal-title fw-bold">Nova Transação</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formTransacao">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Tipo</label>
                        <select id="tipo" class="form-select" required>
                            <option value="receita">Receita</option>
                            <option value="despesa">Despesa</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Valor R$</label>
                        <input id="valor" class="form-control" type="number" placeholder="0.00" min="0" step="0.01" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Data</label>
                        <input id="data" class="form-control" type="date" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Descrição</label>
                        <input id="descricao" class="form-control" type="text" placeholder="Ex: Mercado, Salário..." required />
                    </div>

                    <div class="mb-3" id="categorias-container">
                        <label class="form-label fw-bold small text-uppercase">Categoria</label>
                        <select id="categorias" class="form-select">
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold py-2 mt-2">Salvar Transação</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalDialogEditar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header bg-dark text-white py-3 px-4 rounded-top-4">
                <h5 class="modal-title fw-bold">Editar Transação</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formEditarTransacao">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Tipo</label>
                        <select id="edit-tipo" class="form-select" required>
                            <option value="receita">Receita</option>
                            <option value="despesa">Despesa</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Valor R$</label>
                        <input id="edit-valor" class="form-control" type="number" placeholder="0.00" min="0" step="0.01" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Data</label>
                        <input id="edit-data" class="form-control" type="date" required />
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Descrição</label>
                        <input id="edit-descricao" class="form-control" type="text" placeholder="Descrição" required />
                    </div>

                    <div class="mb-3" id="edit-categorias-container">
                        <label class="form-label fw-bold small text-uppercase">Categoria</label>
                        <select id="edit-categorias" class="form-select">
                        </select>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success flex-grow-1 fw-bold py-2">Salvar Alterações</button>
                        <button type="button" class="btn btn-outline-danger px-4" id="excluirTransacao">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
