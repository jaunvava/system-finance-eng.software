<div class="row mb-5 animate__animated animate__fadeIn">
    <div class="col-md-8 mx-auto text-center">
        <h1 class="display-6 fw-bold">Gestão de Orçamentos</h1>
        <p class="text-muted">Defina limites de gastos por categoria e mantenha o foco.</p>
    </div>
</div>

<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-lg-7">
        <div class="card p-4 h-100">
            <h5 class="fw-bold mb-4">Acompanhamento de Limites</h5>
            <div id="listaOrcamentos" style="max-height: 500px; overflow-y: auto;">
                <!-- Data loaded via script -->
            </div>
        </div>
    </div>
    <div class="col-lg-5">
        <div class="card p-4 h-100 shadow-sm border-0">
            <h5 class="fw-bold mb-4">Configurar Limite</h5>
            <form id="formOrcamento">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-uppercase">Categoria</label>
                    <select id="catOrcamento" class="form-select border-0 bg-light py-2" required>
                        <!-- Populated via JS -->
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold small text-uppercase">Limite Mensal (R$)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0">R$</span>
                        <input type="number" class="form-control border-0 bg-light py-2" placeholder="0.00" min="1" step="0.01" required />
                    </div>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-danger-custom py-2 fw-bold text-white shadow-sm">SALVAR LIMITE</button>
                </div>
            </form>
            <div class="mt-4 p-3 rounded-3 bg-warning bg-opacity-10 small text-dark border-start border-3 border-warning">
                <i class="fa-solid fa-triangle-exclamation me-2"></i> 
                Você receberá alertas visuais quando os gastos ultrapassarem 100% do limite definido.
            </div>
        </div>
    </div>
</div>
