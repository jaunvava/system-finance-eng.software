<div class="row mb-5 animate__animated animate__fadeIn">
    <div class="col-md-8 mx-auto text-center">
        <h1 class="display-6 fw-bold">Gestão de Transações</h1>
        <p class="text-muted">Visualize e controle todas as suas movimentações financeiras.</p>
    </div>
</div>

<div class="row animate__animated animate__fadeInUp">
    <div class="col-12">
        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold mb-0">Histórico de Movimentações</h5>
                <button class="btn btn-primary-custom" id="botaoAbrirTransacao">
                    <i class="fa-solid fa-plus me-2"></i>Nova Transação
                </button>
            </div>
            
            <div id="listaTransacoes" class="table-responsive">
                <!-- Data loaded via script -->
            </div>
        </div>
    </div>
</div>

<!-- Modal para Transação -->
<div class="modal fade" id="modalDialog" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white border-0">
                <h5 class="modal-title fw-bold" id="modalTitle">Transação</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formTransacao">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Tipo</label>
                        <select id="tipo" class="form-select" required>
                            <option value="receita">Receita</option>
                            <option value="despesa">Despesa</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Valor (R$)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0">R$</span>
                            <input id="valor" type="number" class="form-control border-0 bg-light" placeholder="0.00" min="0" step="0.01" required />
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Data</label>
                        <input id="data" type="date" class="form-control border-0 bg-light" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Descrição</label>
                        <input id="descricao" type="text" class="form-control border-0 bg-light" placeholder="Ex: Salário, Almoço..." required />
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase">Categoria</label>
                        <select id="categorias" class="form-select border-0 bg-light">
                            <!-- Populated via JS -->
                        </select>
                    </div>
                    <div class="d-grid shadow-sm">
                        <button type="submit" class="btn btn-primary-custom py-2 fw-bold">SALVAR TRANSAÇÃO</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
