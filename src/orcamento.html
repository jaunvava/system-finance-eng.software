<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamento - Finanças</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <h1>FINANÇAS PESSOAIS</h1>
        </div>
        <div class="navegacao">
            <span><a href="index.html">Dashboard</a></span>
            <span><a href="transacoes.html">Transações</a></span>
            <span><a href="categorias.html">Categorias</a></span>
            <span><a href="relatorios.html">Relatórios</a></span>
            <span><a href="orcamento.html">Orçamento</a></span>
        </div>
    </nav>
    <div class="transacoes">
        <div class="card transacoes">
            <h2>Limites de Orçamento</h2>
            <hr>
            <div id="listaOrcamentos" style="max-height: 250px; overflow-y: auto; text-align: left; display:flex; flex-direction:column; gap:10px; margin-top:20px;"></div>
        </div>
        <div class="card">
            <h3>Definir Orçamento</h3>
            <form id="formOrcamento">
                <select id="catOrcamento" required></select>
                <input type="number" placeholder="Limite R$" min="1" step="0.01" required />
                <button type="submit" class="buttonConfirmar">Salvar</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
