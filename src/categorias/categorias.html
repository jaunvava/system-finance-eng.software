<div class="row mb-5 animate__animated animate__fadeIn">
    <div class="col-md-8 mx-auto text-center">
        <h1 class="display-6 fw-bold">Gerenciar Categorias</h1>
        <p class="text-muted">Organize seu dinheiro classificando suas despesas.</p>
    </div>
</div>

<div class="row g-4 animate__animated animate__fadeInUp">
    <div class="col-lg-7">
        <div class="card p-4 h-100">
            <h5 class="fw-bold mb-4">Minhas Categorias</h5>
            <div id="listaCategorias" style="max-height: 400px; overflow-y: auto;">
                <!-- Data loaded via script -->
            </div>
        </div>
    </div>
    <div class="col-lg-5">
        <div class="card p-4 h-100">
            <h5 class="fw-bold mb-4">Adicionar Nova</h5>
            <form id="formCategoria">
                <div class="mb-4">
                    <label class="form-label fw-bold small text-uppercase">Nome da Categoria</label>
                    <input type="text" class="form-control border-0 bg-light py-2" placeholder="Ex: Educação, Saúde..." required />
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary-custom py-2 fw-bold shadow-sm">SALVAR CATEGORIA</button>
                </div>
            </form>
            <div class="mt-4 p-3 bg-light rounded-3 small text-muted">
                <i class="fa-solid fa-circle-info me-2 text-primary"></i> 
                Categorias ajudam você a entender para onde seu dinheiro está indo nos orçamentos.
            </div>
        </div>
    </div>
</div>
